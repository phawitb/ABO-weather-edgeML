<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open-Meteo PWA Assistant</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fbbf24">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="WeatherAI">

    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f172a; color: white; padding-top: 50px; }
        .container { background: #1e293b; padding: 40px; border-radius: 25px; display: inline-block; width: 85%; max-width: 450px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { background: #fbbf24; color: #000; border: none; padding: 18px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.3s; margin-bottom: 20px; }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        #status { font-size: 14px; color: #94a3b8; margin-bottom: 10px; }
        #city-display { font-size: 28px; color: #fbbf24; font-weight: bold; }
        #weather-info { font-size: 20px; margin-top: 20px; color: #f1f5f9; min-height: 80px; line-height: 1.6; }
        .log { margin-top: 20px; font-size: 11px; color: #fbbf24; text-align: left; background: #000; padding: 10px; border-radius: 10px; overflow-y: auto; max-height: 120px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h2>PWA Weather AI</h2>
        <div id="status">Status: Disconnected</div>
        <button id="connectBtn" onclick="connectBLE()">CONNECT ARDUINO</button>
        <div id="city-display">-</div>
        <div id="weather-info">Waiting for keyword...</div>
        <div id="debugLog" class="log">PWA: Ready</div>
    </div>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registered"));
        }

        const SERVICE_UUID = 0x180C; 
        const CHAR_UUID = 0x2A56;

        function log(msg) {
            const div = document.getElementById('debugLog');
            div.innerHTML += "<br>> " + msg;
            div.scrollTop = div.scrollHeight;
        }

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Nano33_Weather' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(CHAR_UUID);

                document.getElementById('status').innerText = "Status: Connected!";
                document.getElementById('connectBtn').disabled = true;
                log("BLE Connected!");

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = new TextDecoder().decode(event.target.value);
                    if (value !== "None") {
                        document.getElementById('city-display').innerText = value;
                        processWeather(value);
                    }
                });
            } catch (err) { log("Error: " + err); }
        }

        async function processWeather(keyword) {
            const cityName = keyword.replace("weather", "");
            try {
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${cityName}&count=1`);
                const geoData = await geoRes.json();
                if (!geoData.results) return;

                const { latitude, longitude, name, country } = geoData.results[0];
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();
                
                const temp = weatherData.current_weather.temperature;
                const wind = weatherData.current_weather.windspeed;
                const code = weatherData.current_weather.weathercode;

                let condition = (code === 0) ? "clear sky" : (code < 50) ? "cloudy" : "rainy";
                const report = `In ${name}, it is ${temp} degrees Celsius with ${condition}.`;
                
                document.getElementById('weather-info').innerHTML = `Temp: ${temp}°C | ${condition}`;
                speak(report);
            } catch (err) { log("API Error"); }
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
